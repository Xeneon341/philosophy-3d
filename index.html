<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Philosophia — Western Thought in 3D</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        background: #000;
        overflow: hidden;
        font-family: 'Georgia', serif;
        user-select: none;
        -webkit-user-select: none;
      }
      #app { width: 100vw; height: 100vh; position: relative; }
      canvas { display: block; }

      #ui-overlay {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none;
        z-index: 10;
      }

      #title-screen {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: #000;
        z-index: 100;
        transition: opacity 1.5s ease;
      }
      #title-screen h1 {
        color: #c8a96e;
        font-size: clamp(2rem, 6vw, 5rem);
        letter-spacing: 0.3em;
        text-transform: uppercase;
        margin-bottom: 0.5rem;
      }
      #title-screen p {
        color: #555;
        font-size: clamp(0.8rem, 2vw, 1.1rem);
        letter-spacing: 0.2em;
        margin-bottom: 3rem;
      }
      #enter-btn {
        background: transparent;
        border: 1px solid #c8a96e;
        color: #c8a96e;
        padding: 0.8rem 2.5rem;
        font-family: 'Georgia', serif;
        font-size: 1rem;
        letter-spacing: 0.2em;
        cursor: pointer;
        pointer-events: all;
        transition: all 0.3s;
      }
      #enter-btn:hover { background: #c8a96e22; }

      #info-panel {
        position: fixed;
        bottom: 0; left: 0;
        width: 100%;
        padding: 2rem 3rem;
        background: linear-gradient(transparent, #000000bb);
        display: none;
        pointer-events: none;
      }
      #info-panel.visible { display: block; }
      #philosopher-name {
        color: #c8a96e;
        font-size: clamp(1.2rem, 3vw, 2rem);
        letter-spacing: 0.15em;
        margin-bottom: 0.3rem;
      }
      #philosopher-dates {
        color: #666;
        font-size: 0.85rem;
        letter-spacing: 0.1em;
        margin-bottom: 0.8rem;
      }
      #philosopher-quote {
        color: #bbb;
        font-size: clamp(0.8rem, 1.5vw, 1rem);
        font-style: italic;
        max-width: 600px;
        line-height: 1.6;
      }

      #hover-label {
        position: fixed;
        pointer-events: none;
        color: #c8a96e;
        font-size: 0.8rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 0.3s;
        transform: translate(-50%, -180%);
        text-align: center;
        text-shadow: 0 0 20px #c8a96e88;
        white-space: nowrap;
      }
      #hover-label.visible { opacity: 1; }

      #back-btn {
        position: fixed;
        top: 2rem; left: 2rem;
        background: transparent;
        border: 1px solid #c8a96e44;
        color: #c8a96e;
        padding: 0.5rem 1.2rem;
        font-family: 'Georgia', serif;
        font-size: 0.8rem;
        letter-spacing: 0.15em;
        cursor: pointer;
        pointer-events: all;
        display: none;
        transition: all 0.3s;
        z-index: 20;
      }
      #back-btn:hover { border-color: #c8a96e; background: #c8a96e11; }
      #back-btn.visible { display: block; }

      #instructions {
        position: fixed;
        bottom: 2rem; right: 2rem;
        color: #333;
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        line-height: 1.9;
        text-align: right;
        pointer-events: none;
      }

      #loading {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: #000;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 200;
        color: #c8a96e33;
        font-size: 0.75rem;
        letter-spacing: 0.4em;
        transition: opacity 0.8s;
      }

      #world-title {
        position: fixed;
        top: 2rem;
        left: 50%;
        transform: translateX(-50%);
        color: #c8a96e;
        font-size: 0.7rem;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        opacity: 0;
        transition: opacity 0.8s;
        pointer-events: none;
      }
      #world-title.visible { opacity: 1; }

      /* ── Concept Panel ─────────────────────────── */
      #concept-panel {
        position: fixed;
        top: 0; right: 0;
        width: min(480px, 100vw);
        height: 100%;
        background: linear-gradient(135deg, #0a0a12ee, #080810f0);
        border-left: 1px solid #c8a96e22;
        padding: 3rem 2rem 2rem;
        transform: translateX(100%);
        transition: transform 0.45s cubic-bezier(0.16, 1, 0.3, 1);
        z-index: 30;
        overflow-y: auto;
        /* Pass mousedown through so drag starts on canvas;
           click/scroll still work on the panel content */
        pointer-events: all;
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        /* Prevent text highlight while dragging through the panel */
        user-select: none;
        -webkit-user-select: none;
      }
      #concept-panel.visible { transform: translateX(0); }

      #concept-close {
        position: absolute;
        top: 1.2rem; right: 1.5rem;
        background: transparent;
        border: 1px solid #c8a96e33;
        color: #c8a96e;
        width: 2rem; height: 2rem;
        cursor: pointer;
        font-size: 1rem;
        line-height: 1;
        transition: all 0.2s;
        display: flex; align-items: center; justify-content: center;
      }
      #concept-close:hover { border-color: #c8a96e; background: #c8a96e11; }

      #concept-title {
        color: #c8a96e;
        font-size: 1.1rem;
        letter-spacing: 0.15em;
        text-transform: uppercase;
        margin-bottom: 1.5rem;
        padding-bottom: 1rem;
        border-bottom: 1px solid #c8a96e22;
        line-height: 1.4;
      }

      #concept-body {
        color: #ccc;
        font-size: 0.88rem;
        line-height: 1.85;
      }
      #concept-body p {
        margin-bottom: 1.2rem;
      }
      #concept-body p:last-child { margin-bottom: 0; }
      #concept-body strong {
        color: #e8d0a0;
      }
      #concept-body em {
        color: #b0c8e0;
        font-style: italic;
      }

      /* ── World hint ─────────────────────────────── */
      #world-hint {
        position: fixed;
        bottom: 2rem; right: 2rem;
        color: #333;
        font-size: 0.7rem;
        letter-spacing: 0.12em;
        line-height: 1.9;
        text-align: right;
        pointer-events: none;
        display: none;
      }
      #world-hint.visible { display: block; }
    </style>
  </head>
  <body>
    <div id="loading">LOADING</div>
    <div id="app"></div>

    <div id="title-screen">
      <h1>Philosophia</h1>
      <p>Western Thought &middot; 600 BCE &mdash; 1951 CE</p>
      <button id="enter-btn">Enter the Universe</button>
    </div>

    <div id="ui-overlay">
      <div id="hover-label"></div>
      <div id="info-panel">
        <div id="philosopher-name"></div>
        <div id="philosopher-dates"></div>
        <div id="philosopher-quote"></div>
      </div>
    </div>

    <button id="back-btn">&#8592; Universe</button>
    <div id="world-title"></div>

    <!-- Concept panel (slides in from right) -->
    <div id="concept-panel">
      <button id="concept-close">&#10005;</button>
      <div id="concept-title"></div>
      <div id="concept-body"></div>
    </div>

    <div id="instructions">
      Hover to explore &middot; Click to enter<br>
      Drag to orbit &middot; Scroll to zoom
    </div>
    <div id="world-hint">
      Click glowing markers to explore concepts<br>
      Drag to orbit &middot; Scroll to zoom
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
